<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DROP ZERO</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/entry.css">
</head>
<body class="entry-page">

  <div class="noise-overlay"></div>

  <main class="entry-container">

    <div class="entry-header">
      <span class="system-label">SYS // ACTIVE</span>
      <span class="system-label right" id="timestamp"></span>
    </div>

    <div class="entry-core">
      <div class="brand-mark">
        <h1 class="brand-name">DROP<br>ZERO</h1>
        <div class="brand-line"></div>
      </div>

      <div class="entry-status">
        <div class="status-row">
          <span class="status-key">CYCLE</span>
          <span class="status-val">01</span>
        </div>
        <div class="status-row">
          <span class="status-key">DESIGNATIONS</span>
          <span class="status-val">03</span>
        </div>
        <div class="status-row">
          <span class="status-key">UNITS / DESIGNATION</span>
          <span class="status-val">15</span>
        </div>
        <div class="status-row">
          <span class="status-key">WINDOW</span>
          <span class="status-val" id="window-status">OPEN</span>
        </div>
      </div>

      <a href="collection.html" class="proceed-btn">
        <span class="btn-text">PROCEED</span>
        <span class="btn-arrow">→</span>
      </a>
    </div>

    <div class="entry-footer">
      <span class="footer-text">UNITS ARE NOT RESTOCKED. WINDOW CLOSES WITHOUT WARNING.</span>
    </div>

  </main>

  <script src="js/entry.js"></script>
</body>
</html>
